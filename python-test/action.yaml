name: Test Python code.
description: >-
  Runs pytest via GNU Make.  Installs Python along with matching
  versions of Google Chrome and ChromeDriver for use with Selenium.
  The makefile targets `build-deps`, which runs as the superuser, and
  `test` **MUST** handle other test dependencies.  Supports
  [matrix strategies](https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/run-job-variations).

inputs:
  python-version:
    description: The version of Python with which to test.
    required: true
    default: "3.13"
  requirements:
    description: >-
      The name of a workflow artifact containing Python package
      dependency pins.
    default: pip-compile-artifacts

runs:
  using: composite
  steps:
    - name: Clone this GitHub repository (just the latest commit).
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Download the Python package dependency pins.
      if: inputs.requirements
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.requirements }}
    - name: Install Python ${{ inputs.python-version }}.
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
    - name: Install Google Chrome.
      id: setup-chrome
      uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
      with:
        install-dependencies: true
        install-chromedriver: true
    - name: Force Selenium to use Chrome.
      shell: bash
      run: |
        echo "SE_BROWSER_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"
    - name: Install build dependencies.
      shell: bash
      run: sudo make build-deps
    - name: Run the test suite.
      shell: bash
      run: make test
