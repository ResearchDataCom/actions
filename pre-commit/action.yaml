name: Lint code.
description: >-
  Checks code syntax/style using the configured
  [pre-commit](https://pre-commit.com/) hooks.  Installs several
  common linter dependencies, including
  [OpenTofu](https://opentofu.org/),
  [pinact](https://github.com/suzuki-shunsuke/pinact/), and
  [Trivy](https://trivy.dev/).

inputs:
  access-app-id:
    description: >-
      Provide the app ID of a GitHub App used to access private
      repositories.  When
      [registering the app](https://docs.github.com/en/apps/creating-github-apps/registering-a-github-app/registering-a-github-app)
      in the organization, disable webhook functionality and grant
      **read-only**
      [repository permissions for "Contents"](https://docs.github.com/en/rest/authentication/permissions-required-for-github-apps#repository-permissions-for-contents).
      After completing app registration,
      [generate a private key](https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/managing-private-keys-for-github-apps)
      and install the app, giving it access to selected repositories
      as appropriate.
    required: false
    default: ~
  access-key:
    description: >-
      Log into the GitHub App used to access private repositories with
      this
      [private key](https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/managing-private-keys-for-github-apps).
    required: false
    default: ~
  owner:
    description: >-
      Optionally access private OpenTofu modules in repositories owned
      by this GitHub account or organization, overriding
      [github.repository_owner](https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#github-context).
    required: false
    default: ~
  python-version:
    description: The version of Python with which to run pre-commit.
    required: true
    default: "3.13"

runs:
  using: composite
  steps:
    - name: Clone this GitHub repository (just the latest commit).
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Install Python ${{ inputs.python-version }}.
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: ${{ hashFiles('pyproject.toml') && 'pip' || null }}
    - name: Install pre-commit.
      shell: bash
      run: pip install -r "${GITHUB_ACTION_PATH}/requirements.txt" --require-hashes
    - name: Install OpenTofu.
      uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
      with:
        cache: true
        tofu_version: 1.12.3
    - name: Install TFLint.
      uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
      with:
        cache: true
        tflint_version: v0.63.1
    - name: Install TFLint plugins.
      if: hashFiles('.tflint.*')
      shell: bash
      run: tflint --init
    - name: Install pinact.
      shell: bash
      run: |
        version=v4.1.0
        asset=pinact_linux_amd64.tar.gz
        bindir=$(mktemp -d)
        gh release download -R suzuki-shunsuke/pinact "$version" -p "$asset"
        gh attestation verify "$asset" \
            -R suzuki-shunsuke/pinact \
            --signer-workflow suzuki-shunsuke/go-release-workflow/.github/workflows/release.yaml
        tar -C "$bindir" -xzf "$asset" pinact
        rm "$asset"
        echo "$bindir" >> $GITHUB_PATH
      env:
        GH_TOKEN: ${{ github.token }}
    - name: Install Trivy.
      uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
      with:
        version: v0.71.2
    - name: Set up private repository access (if configured).
      id: private-repository-access
      if: inputs.access-app-id && inputs.access-key
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ inputs.access-app-id }}
        private-key: ${{ inputs.access-key }}
        owner: ${{ inputs.owner || github.repository_owner }}
    - name: Configure Git client authentication.
      if: steps.private-repository-access.outputs.token
      uses: de-vri-es/setup-git-credentials@5dd446b3857806f44ea73acf83c193190a385d63 # v2.2.0
      with:
        credentials: |
          https://x-access-token:${{ steps.private-repository-access.outputs.token }}@github.com/
    - name: Cache pre-commit hooks.
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/pre-commit
        key: pre-commit|${{ inputs.python-version }}|${{ hashFiles('.pre-commit-config.yaml') }}
    - name: Run the linter.
      shell: bash
      run: pre-commit run --show-diff-on-failure --color=always --all-files
      env:
        GITHUB_TOKEN: ${{ steps.private-repository-access.outputs.token }}
