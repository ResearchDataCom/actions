name: Pin OpenTofu providers.
description: >-
  Pins OpenTofu providers and stores them in a
  [GitHub Actions workflow artifact](https://docs.github.com/en/actions/concepts/workflows-and-actions/workflow-artifacts),
  an immutable archive, which facilitates reproducible builds.
  Assumes OpenTofu is installed and private repository access is
  established (if needed), e.g., as if run after the ../pre-commit
  action in the same workflow job.

inputs:
  artifact-name:
    description: >-
      The name of the immutable archive that will contain the
      dependency pins.
    required: true
    default: tofu-providers-lock-artifacts

runs:
  using: composite
  steps:
    - name: Download OpenTofu modules and providers.
      shell: bash
      run: tofu init
    - name: Lock OpenTofu providers across all supported platforms.
      shell: bash
      run:
        tofu providers lock
        --platform=windows_amd64
        --platform=darwin_arm64
        --platform=linux_amd64
        --platform=linux_arm64
    - name: Upload the lock file to artifact storage.
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: .terraform.lock.hcl
        if-no-files-found: error
        include-hidden-files: true
